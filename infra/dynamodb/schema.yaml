version: 1
name: infinity-node-scheduler
kind: dynamodb-schema

defaults:
  billing_mode: PAY_PER_REQUEST
  pitr_enabled: true
  encryption: AWS_OWNED_KMS_KEY
  stream_view_type: NEW_AND_OLD_IMAGES
  tags:
    project: infinity-node
    component: scheduler
    owner: person-2

enums:
  job_state:
    - PENDING
    - SCHEDULED
    - DISPATCHED
    - RUNNING
    - TERMINAL
  failure_category:
    - VM_BOOT
    - EXEC_TIMEOUT
    - EXEC_RUNTIME
    - ARTIFACT_FETCH
    - INFRA
    - DEADLETTERED

tables:
  - name: infinity-node-jobs-v1
    description: source-of-truth state machine for all jobs
    keys:
      partition_key:
        name: job_id
        type: S
    attributes:
      - { name: job_id, type: S, required: true }
      - { name: tenant_id, type: S, required: true, default: public }
      - { name: state, type: S, required: true, enum_ref: job_state }
      - { name: schema_version, type: N, required: true, default: 1 }
      - { name: priority, type: N, required: true, default: 100 }
      - { name: retry_count, type: N, required: true, default: 0 }
      - { name: max_retries, type: N, required: true, default: 3 }
      - { name: next_attempt_at, type: N, required: false }
      - { name: assigned_node, type: S, required: false }
      - { name: lease_expires_at, type: N, required: false }
      - { name: preferred_region, type: S, required: false, default: global }
      - { name: idempotency_key, type: S, required: true }
      - { name: artifact_ref, type: M, required: true }
      - { name: input_ref, type: M, required: false }
      - { name: resource_limits, type: M, required: true }
      - { name: result_ref, type: M, required: false }
      - { name: failure, type: M, required: false }
      - { name: telemetry_ref, type: M, required: false }
      - { name: created_at, type: N, required: true }
      - { name: updated_at, type: N, required: true }
      - { name: ttl_archive_at, type: N, required: false, ttl: true }

      # materialized index attributes
      - { name: gsi1_pk, type: S, required: true }
      - { name: gsi1_sk, type: S, required: true }
      - { name: gsi2_pk, type: S, required: false }
      - { name: gsi2_sk, type: S, required: false }
      - { name: gsi3_pk, type: S, required: true }
      - { name: gsi3_sk, type: S, required: true }

    computed_attributes:
      - name: gsi1_pk
        expression: "STATE#{state}#REGION#{preferred_region|global}#SHARD#{00..63}"
      - name: gsi1_sk
        expression: "LEASE#{lease_expires_at|0}#PRI#{priority}#JOB#{job_id}"
      - name: gsi2_pk
        expression: "NODE#{assigned_node}"
      - name: gsi2_sk
        expression: "LEASE#{lease_expires_at|0}#JOB#{job_id}"
      - name: gsi3_pk
        expression: "TENANT#{tenant_id}#STATE#{state}"
      - name: gsi3_sk
        expression: "CREATED#{created_at}#JOB#{job_id}"

    secondary_indexes:
      - name: by_state_lease
        partition_key: { name: gsi1_pk, type: S }
        sort_key: { name: gsi1_sk, type: S }
        projection: ALL
      - name: by_node_lease
        partition_key: { name: gsi2_pk, type: S }
        sort_key: { name: gsi2_sk, type: S }
        projection: ALL
      - name: by_tenant_state_created
        partition_key: { name: gsi3_pk, type: S }
        sort_key: { name: gsi3_sk, type: S }
        projection: ALL

    streams:
      enabled: true

    constraints:
      - name: create_job_unique
        type: conditional_put
        condition: attribute_not_exists(job_id)
      - name: claim_job_atomic
        type: conditional_update
        condition: "state = SCHEDULED AND (attribute_not_exists(lease_expires_at) OR lease_expires_at < :now)"
      - name: start_running_atomic
        type: conditional_update
        condition: "state = DISPATCHED AND assigned_node = :node_id"
      - name: finish_terminal_atomic
        type: conditional_update
        condition: "state = RUNNING AND assigned_node = :node_id"

  - name: infinity-node-idempotency-v1
    description: dedupe key registry
    keys:
      partition_key: { name: tenant_id, type: S }
      sort_key: { name: idempotency_key, type: S }
    attributes:
      - { name: tenant_id, type: S, required: true }
      - { name: idempotency_key, type: S, required: true }
      - { name: job_id, type: S, required: true }
      - { name: request_hash, type: S, required: true }
      - { name: created_at, type: N, required: true }
      - { name: expires_at, type: N, required: true, ttl: true }
      - { name: schema_version, type: N, required: true, default: 1 }
    secondary_indexes:
      - name: by_job_id
        partition_key: { name: job_id, type: S }
        sort_key: { name: created_at, type: N }
        projection: ALL
    streams:
      enabled: false
    constraints:
      - name: unique_idempotency_per_tenant
        type: conditional_put
        condition: "attribute_not_exists(tenant_id) AND attribute_not_exists(idempotency_key)"

  - name: infinity-node-deadletter-v1
    description: terminal failed jobs for support and replay tooling
    keys:
      partition_key: { name: tenant_id, type: S }
      sort_key: { name: failed_at_job, type: S }
    attributes:
      - { name: tenant_id, type: S, required: true }
      - { name: failed_at_job, type: S, required: true }
      - { name: job_id, type: S, required: true }
      - { name: final_state, type: S, required: true, default: TERMINAL }
      - { name: retry_count, type: N, required: true }
      - { name: max_retries, type: N, required: true }
      - { name: failure, type: M, required: true }
      - { name: last_assigned_node, type: S, required: false }
      - { name: artifact_ref, type: M, required: true }
      - { name: input_ref, type: M, required: false }
      - { name: resource_limits, type: M, required: true }
      - { name: created_at, type: N, required: true }
      - { name: failed_at, type: N, required: true }
      - { name: schema_version, type: N, required: true, default: 1 }
      - { name: ttl_archive_at, type: N, required: false, ttl: true }
    secondary_indexes:
      - name: by_job_id
        partition_key: { name: job_id, type: S }
        sort_key: { name: failed_at, type: N }
        projection: ALL
    streams:
      enabled: true

state_machine:
  table: infinity-node-jobs-v1
  initial_state: PENDING
  transitions:
    - from: PENDING
      to: SCHEDULED
      by: api_or_ingest
    - from: SCHEDULED
      to: DISPATCHED
      by: dispatch_coordinator
      requires: claim_job_atomic
    - from: DISPATCHED
      to: RUNNING
      by: worker_node
      requires: start_running_atomic
    - from: RUNNING
      to: TERMINAL
      by: worker_node
      requires: finish_terminal_atomic
    - from: RUNNING
      to: SCHEDULED
      by: lease_reaper
      on: lease_expired
      effect:
        increment: retry_count
        set: next_attempt_at
    - from: SCHEDULED
      to: TERMINAL
      by: lease_reaper
      on: retry_budget_exhausted
      effect:
        write_table: infinity-node-deadletter-v1

operational_rules:
  - name: strong_consistency_for_reads
    value: true
  - name: delete_sqs_on_dispatched
    value: true
  - name: max_clock_skew_ms
    value: 5000
  - name: default_lease_ms
    value: 120000
  - name: shard_count_state_indexes
    value: 64
